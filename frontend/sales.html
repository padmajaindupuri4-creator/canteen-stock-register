<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Sales - Canteen Stock Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">
        <nav class="sidebar" id="main-nav"></nav>

        <main class="main-content">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 style="margin-bottom: 0.5rem;">Record Sales</h2>
                    <p class="text-muted">Log canteen sales to automatically deduct stock.</p>
                </div>
            </div>

            <div class="grid grid-cols-2">
                <!-- Left Side: Sales Form -->
                <div class="soft-card">
                    <h2>Record New Sale</h2>
                    <form id="sales-form">
                        <div class="form-group">
                            <label for="item_id">Select Item</label>
                            <select id="item_id" required>
                                <option value="">Loading items...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="quantity">Quantity Sold</label>
                            <input type="number" id="quantity" min="1" step="0.5" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Sale</button>
                        <p class="text-muted mt-4" style="font-size: 0.85rem;">
                            Note: Selling prepared food items will automatically deduct the corresponding raw materials
                            from the stock based on defined dependency mappings.
                        </p>
                    </form>
                </div>

                <!-- Right Side: Recent Sales Table -->
                <div class="soft-card table-container">
                    <h2>Recent Sales</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Item Name</th>
                                <th>Qty</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="sales-table-body">
                            <tr>
                                <td colspan="3" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Load API and App logic -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadItemsDropdown();
            await loadRecentSales();

            document.getElementById('sales-form').addEventListener('submit', handleSalesSubmit);
        });

        async function loadItemsDropdown() {
            try {
                const items = await window.api.Stock.getAll();
                const selectElement = document.getElementById('item_id');

                if (items.length === 0) {
                    selectElement.innerHTML = '<option value="">No items available</option>';
                    return;
                }

                selectElement.innerHTML = items.map(item => `
                    <option value="${item.item_id}">${item.item_name} (${item.category}) - Avail: ${item.quantity} ${item.unit}</option>
                `).join('');

            } catch (error) {
                console.error("Failed to load items:", error);
            }
        }

        async function loadRecentSales() {
            const tbody = document.getElementById('sales-table-body');
            try {
                const sales = await window.api.Sales.getAll();

                if (sales.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center">No recent sales.</td></tr>';
                    return;
                }

                tbody.innerHTML = sales.slice(0, 10).map(sale => `
                    <tr>
                        <td>
                            <strong>${sale.item_name}</strong>
                            <div style="font-size:0.85rem; margin-top: 4px;">${sale.category}</div>
                        </td>
                        <td style="font-weight: 600; font-size: 1.1rem;">${sale.quantity_sold}</td>
                        <td style="font-size: 0.85rem;">${window.app.formatDate(sale.sale_date)}</td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Failed to load sales.</td></tr>';
            }
        }

        async function handleSalesSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;

            try {
                btn.textContent = 'Recording...';
                btn.disabled = true;

                const item_id = document.getElementById('item_id').value;
                const quantity_sold = document.getElementById('quantity').value;

                await window.api.Sales.record({ item_id, quantity_sold });

                window.app.showAlert('Sale recorded successfully!');

                document.getElementById('quantity').value = '';

                // Refresh data
                await loadItemsDropdown();
                await loadRecentSales();

            } catch (error) {
                window.app.showAlert(error.message, 'error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
